<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://www.googletagmanager.com https://www.gstatic.com https://translate.google.com https://translate.googleapis.com https://cdnjs.cloudflare.com 'unsafe-inline'; style-src 'self' https://fonts.googleapis.com https://cdnjs.cloudflare.com https://translate.googleapis.com 'unsafe-inline'; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; img-src 'self' https: data:; frame-src https://www.google.com https://translate.google.com; connect-src 'self' https://firestore.googleapis.com https://identitytoolkit.googleapis.com https://www.googleapis.com https://www.google-analytics.com https://translate.googleapis.com;">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Age Selection - Election Mentor AI. Verify your age eligibility to vote in upcoming elections.">
    <meta name="theme-color" content="#0f1016">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Age Selection - Election Mentor AI</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-PLACEHOLDER"></script>
    <script src="analytics.js" defer></script>
</head>
<body>
    <a href="#main-content" class="skip-link">Skip to main content</a>
    <div class="app-container" role="application">
        <!-- Sidebar -->
        <aside class="sidebar" role="navigation" aria-label="Main Navigation">
            <div class="logo-section">
                <div class="logo-icon">
                    <i class="fa-solid fa-cube"></i>
                </div>
                <div class="logo-text">
                    <h1>Election</h1>
                    <p>Mentor AI</p>
                </div>
            </div>

            <nav class="sidebar-nav">
                <a href="index.html" class="nav-item">
                    <i class="fa-solid fa-chart-pie"></i>
                    <span>Dashboard</span>
                </a>
                <a href="timeline.html" class="nav-item">
                    <i class="fa-solid fa-timeline"></i>
                    <span>Timeline</span>
                </a>
                <a href="simulation.html" class="nav-item">
                    <i class="fa-solid fa-vr-cardboard"></i>
                    <span>Simulation</span>
                </a>
                <a href="#" class="nav-item">
                    <i class="fa-solid fa-book-open"></i>
                    <span>Learn</span>
                </a>
                <a href="#" class="nav-item active">
                    <i class="fa-solid fa-bars-progress"></i>
                    <span>My Progress</span>
                </a>
                <a href="#" class="nav-item">
                    <i class="fa-solid fa-shield-halved"></i>
                    <span>Myths Buster</span>
                </a>
                <a href="#" class="nav-item">
                    <i class="fa-solid fa-gear"></i>
                    <span>Settings</span>
                </a>
            </nav>

            <div class="need-help-widget">
                <div class="robot-icon">
                    <i class="fa-solid fa-robot"></i>
                </div>
                <div class="help-text">
                    <p class="help-title">Need help?</p>
                    <p class="help-subtitle">Ask our AI<br>Assistant</p>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content" id="main-content" role="main">
            <!-- Top Bar -->
            <header class="top-bar">
                <div class="welcome-message">
                    <h2>Onboarding</h2>
                    <p>Step 2 of 4</p>
                </div>
                <div class="user-actions">
                    <button class="notification-btn">
                        <i class="fa-regular fa-bell"></i>
                        <span class="badge"></span>
                    </button>
                    <div class="user-profile">
                        <img loading="lazy" src="https://ui-avatars.com/api/?name=Vaishnavi&background=random" alt="Vaishnavi">
                        <div class="user-info">
                            <span class="user-name">Vaishnavi</span>
                            <span class="user-location">Maharashtra</span>
                        </div>
                        <i class="fa-solid fa-chevron-down dropdown-icon"></i>
                    </div>
                </div>
            </header>

            <!-- Onboarding Arc -->
            <div class="age-selection-content">
                <div class="age-selection-card">
                    <span class="onboarding-step-label">Step 2 of 4</span>
                    <h2 class="onboarding-step-title">How old are you?</h2>
                    <p class="onboarding-step-description">Your age helps us personalize your experience</p>

                    <!-- Curved Arc Gauge / Control -->
                    <div class="arc-slider-wrapper">
                        <svg class="arc-svg" viewBox="0 0 200 120">
                            <!-- Background Track Arc -->
                            <path class="arc-track" d="M 20 100 A 80 80 0 0 1 180 100" />
                            <!-- Value Filled Track Arc -->
                            <path class="arc-fill" d="M 20 100 A 80 80 0 0 1 70 38" />
                            <!-- Handle Indicator Circle on the Arc -->
                            <circle class="arc-handle" cx="70" cy="38" r="5" />
                        </svg>
                        
                        <div class="arc-labels">
                            <span class="label-left">18</span>
                            <div class="age-display">
                                <span class="age-number">19</span>
                                <span class="age-unit">Years</span>
                            </div>
                            <span class="label-right">100</span>
                        </div>
                    </div>

                    <img loading="lazy" src="building_asset.webp" alt="Building" class="icon-small-shadow">

                    <button class="btn-primary onboarding-next-btn">Next</button>
                </div>
            </div>
        </main>
    </div>

    <script>
        function saveAgeAndNavigate() {
            localStorage.setItem('voter_age', '19');
            window.location.href = 'location-selection.html';
        }
    </script>
    <script src="app.js"></script>
</body>
</html>
