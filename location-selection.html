<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://www.googletagmanager.com https://www.gstatic.com https://translate.google.com https://translate.googleapis.com https://cdnjs.cloudflare.com 'unsafe-inline'; style-src 'self' https://fonts.googleapis.com https://cdnjs.cloudflare.com https://translate.googleapis.com 'unsafe-inline'; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; img-src 'self' https: data:; frame-src https://www.google.com https://translate.google.com; connect-src 'self' https://firestore.googleapis.com https://identitytoolkit.googleapis.com https://www.googleapis.com https://www.google-analytics.com https://translate.googleapis.com;">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Location Selection - Election Mentor AI. Select your state and district for personalized voting information.">
    <meta name="theme-color" content="#0f1016">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Location Selection - Election Mentor AI</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-PLACEHOLDER"></script>
    <script src="analytics.js" defer></script>
</head>
<body>
    <a href="#main-content" class="skip-link">Skip to main content</a>
    <div class="app-container" role="application">
        <!-- Sidebar -->
        <aside class="sidebar" role="navigation" aria-label="Main Navigation">
            <div class="logo-section">
                <div class="logo-icon">
                    <i class="fa-solid fa-cube"></i>
                </div>
                <div class="logo-text">
                    <h1>Election</h1>
                    <p>Mentor AI</p>
                </div>
            </div>

            <nav class="sidebar-nav">
                <a href="index.html" class="nav-item">
                    <i class="fa-solid fa-chart-pie"></i>
                    <span>Dashboard</span>
                </a>
                <a href="timeline.html" class="nav-item">
                    <i class="fa-solid fa-timeline"></i>
                    <span>Timeline</span>
                </a>
                <a href="simulation.html" class="nav-item">
                    <i class="fa-solid fa-vr-cardboard"></i>
                    <span>Simulation</span>
                </a>
                <a href="#" class="nav-item">
                    <i class="fa-solid fa-book-open"></i>
                    <span>Learn</span>
                </a>
                <a href="#" class="nav-item active">
                    <i class="fa-solid fa-bars-progress"></i>
                    <span>My Progress</span>
                </a>
                <a href="#" class="nav-item">
                    <i class="fa-solid fa-shield-halved"></i>
                    <span>Myths Buster</span>
                </a>
                <a href="#" class="nav-item">
                    <i class="fa-solid fa-gear"></i>
                    <span>Settings</span>
                </a>
            </nav>

            <div class="need-help-widget">
                <div class="robot-icon">
                    <i class="fa-solid fa-robot"></i>
                </div>
                <div class="help-text">
                    <p class="help-title">Need help?</p>
                    <p class="help-subtitle">Ask our AI<br>Assistant</p>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content" id="main-content" role="main">
            <!-- Top Bar -->
            <header class="top-bar">
                <div class="welcome-message">
                    <h2>Onboarding</h2>
                    <p>Step 3 of 4</p>
                </div>
                <div class="user-actions">
                    <button class="notification-btn">
                        <i class="fa-regular fa-bell"></i>
                        <span class="badge"></span>
                    </button>
                    <div class="user-profile">
                        <img loading="lazy" src="https://ui-avatars.com/api/?name=Aarav+Sharma&background=random" alt="Aarav Sharma">
                        <div class="user-info">
                            <span class="user-name">Aarav Sharma</span>
                            <span class="user-location">Maharashtra</span>
                        </div>
                        <i class="fa-solid fa-chevron-down dropdown-icon"></i>
                    </div>
                </div>
            </header>

            <!-- Onboarding Step 3 -->
            <div class="location-selection-content">
                <div class="location-selection-card">
                    <span class="onboarding-step-label">Step 3 of 4</span>
                    <h2 class="onboarding-step-title">Where do you live?</h2>
                    <p class="onboarding-step-description">Select your state and district</p>

                    <!-- Google Translate -->
                    <div id="google_translate_element" class="m-bottom-12"></div>
                    <script type="text/javascript" src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

                    <!-- Custom Dropdowns -->
                    <div class="dropdown-group">
                        <div class="custom-select-box">
                            <span class="select-label">State</span>
                            <div class="select-field">
                                <span>Maharashtra</span>
                                <i class="fa-solid fa-chevron-down"></i>
                            </div>
                        </div>

                        <div class="custom-select-box">
                            <span class="select-label">District</span>
                            <div class="select-field">
                                <span>Pune</span>
                                <i class="fa-solid fa-chevron-down"></i>
                            </div>
                        </div>
                    </div>

                    <!-- Google Maps Embed for polling booths -->
                    <div class="polling-booth-map" class="polling-map-container">
                        <iframe 
                          src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3783.3892702737636!2d73.8544!3d18.5204!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3bc2c070444bbd97%3A0xb35a09e07ee69e6b!2sPune%2C%20Maharashtra!5e0!3m2!1sen!2sin!4v1714800000000!5m2!1sen!2sin" 
                          width="100%" 
                          height="100%" 
                          class="border-0" 
                          allowfullscreen="" 
                          loading="lazy" 
                          referrerpolicy="no-referrer-when-downgrade">
                        </iframe>
                    </div>

                    <div class="location-bottom-panel">
                        <div class="monument-visual" class="monument-visual-offset">
                            <img loading="lazy" src="where_do_u_live_asset.png" alt="Location" class="monument-img">
                        </div>
                        <button class="btn-primary onboarding-next-btn location-next-btn">Next</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        function saveLocationAndNavigate() {
            localStorage.setItem('voter_state', 'Maharashtra');
            localStorage.setItem('voter_district', 'Pune');
            window.location.href = 'voter-type.html';
        }
    </script>
    <script src="app.js"></script>
</body>
</html>
