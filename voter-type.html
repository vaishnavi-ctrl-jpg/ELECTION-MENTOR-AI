<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voter Type - Election Mentor AI</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo-section">
                <div class="logo-icon">
                    <i class="fa-solid fa-cube"></i>
                </div>
                <div class="logo-text">
                    <h1>Election</h1>
                    <p>Mentor AI</p>
                </div>
            </div>

            <nav class="sidebar-nav">
                <a href="index.html" class="nav-item">
                    <i class="fa-solid fa-chart-pie"></i>
                    <span>Dashboard</span>
                </a>
                <a href="timeline.html" class="nav-item">
                    <i class="fa-solid fa-timeline"></i>
                    <span>Timeline</span>
                </a>
                <a href="simulation.html" class="nav-item">
                    <i class="fa-solid fa-vr-cardboard"></i>
                    <span>Simulation</span>
                </a>
                <a href="#" class="nav-item">
                    <i class="fa-solid fa-book-open"></i>
                    <span>Learn</span>
                </a>
                <a href="#" class="nav-item active">
                    <i class="fa-solid fa-bars-progress"></i>
                    <span>My Progress</span>
                </a>
                <a href="#" class="nav-item">
                    <i class="fa-solid fa-shield-halved"></i>
                    <span>Myths Buster</span>
                </a>
                <a href="#" class="nav-item">
                    <i class="fa-solid fa-gear"></i>
                    <span>Settings</span>
                </a>
            </nav>

            <div class="need-help-widget" onclick="window.location.href='index.html?chat=true'" style="cursor: pointer;">
                <div class="robot-icon">
                    <i class="fa-solid fa-robot"></i>
                </div>
                <div class="help-text">
                    <p class="help-title">Need help?</p>
                    <p class="help-subtitle">Ask our AI<br>Assistant</p>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Top Bar -->
            <header class="top-bar">
                <div class="welcome-message">
                    <h2>Onboarding</h2>
                    <p>Step 4 of 4</p>
                </div>
                <div class="user-actions">
                    <button class="notification-btn">
                        <i class="fa-regular fa-bell"></i>
                        <span class="badge"></span>
                    </button>
                    <div class="user-profile">
                        <img src="https://ui-avatars.com/api/?name=Aarav+Sharma&background=random" alt="Aarav Sharma">
                        <div class="user-info">
                            <span class="user-name">Aarav Sharma</span>
                            <span class="user-location">Maharashtra</span>
                        </div>
                        <i class="fa-solid fa-chevron-down dropdown-icon"></i>
                    </div>
                </div>
            </header>

            <!-- Onboarding Step 4 -->
            <div class="voter-type-content">
                <div class="voter-type-card">
                    <span class="onboarding-step-label">Step 4 of 4</span>
                    <h2 class="onboarding-step-title">First time voting?</h2>
                    <p class="onboarding-step-description">This helps us customize your guidance</p>

                    <!-- Large option boxes -->
                    <div class="choice-boxes-group">
                        <div class="choice-box selected" onclick="selectChoice(this)">
                            <div class="choice-circle active">
                                <i class="fa-solid fa-check"></i>
                            </div>
                            <span class="choice-title">Yes</span>
                            <span class="choice-subtitle">First time voter</span>
                        </div>

                        <div class="choice-box" onclick="selectChoice(this)">
                            <div class="choice-circle">
                                <i class="fa-solid fa-check"></i>
                            </div>
                            <span class="choice-title">No</span>
                            <span class="choice-subtitle">Not first time</span>
                        </div>
                    </div>

                    <div style="text-align: center; margin: 12px 0;">
                        <img src="verify_ur_details_asset.png" alt="Verify Details" style="max-width: 64px; height: auto; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.25);">
                    </div>

                    <button class="btn-primary onboarding-next-btn voter-finish-btn" onclick="saveVoterTypeAndNavigate()">Finish</button>
                </div>
            </div>
        </main>
    </div>

    <script>
        let voterType = 'First time voter';

        function selectChoice(el) {
            document.querySelectorAll('.choice-box').forEach(box => {
                box.classList.remove('selected');
                box.querySelector('.choice-circle').classList.remove('active');
            });
            el.classList.add('selected');
            el.querySelector('.choice-circle').classList.add('active');
            
            voterType = el.querySelector('.choice-subtitle').innerText;
        }

        function saveVoterTypeAndNavigate() {
            localStorage.setItem('voter_type', voterType);
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
